# ==========================================
# 策略參數 — 所有數字都在這裡調，不改 code
# ==========================================
#
# 本檔＝現行 live 策略的單一真相來源，只列「正在用」的參數。
# 2026-06-16 重構：已實證否決的選項（過度延伸濾鏡、市場波動曝險縮放、類股分散、
#   MA60 斜率/大盤 MA20 出場、capitulation 的 amihud/reclaim 豁免/unlock·full 模式/deep_bear 收停損…）
#   已自本檔移除——這些 code 端皆 .get(預設=關閉)，移除不改變任何行為。其否決理由與數據完整收錄於
#   taiwan_trading_bot_master.md 第六章「6.9 已否決選項清單」，未來請勿再加回。
#
# 註解圖例：⚠️ ＝現行仍在用、但 2026-06-16 診斷點名「待 v2 改善」的設定（詳見 master 第六章）。
#
# 【2026-06-16 診斷重點】（完整見 master 第六章 + docs/IMPROVEMENT_PLAN_v2.md）
#   全期(2018–25 / 100k / 零股) 年化 12.7% / Sharpe 1.16 / DD -16% / PF 1.97 / 222 筆；
#   對照 0050 買進持有 年化 20% / Sharpe 1.01 / DD -34% / 總報酬 309%（策略僅 152%）。
#   ① 交易頻率天花板＝「6 格並倉 + 抱贏家」，非濾網/選股範圍（放寬濾網不增交易、加大並倉才增）。
#   ② 擴大選股 35→53 檔反而全面變差。 ③ 量比≥1.5 是每日 0 候選的主因。
#   ④ 2024 大多頭只 +7.2%（0050 +49%）＝ATR 停損對高波動股太緊。 改善路線見 master 第六章 Phase 6–11。
# ────────────────────────────────────────────────────────────────────────────────

# --- TA 初篩條件（站上向上 MA20 + 量能放大 + RSI 健康，四條件 AND）---
ta_filter:
  ma_period: 20             # 均線週期
  ma_slope_days: 3          # MA20 向上斜率計算天數
  volume_ratio_min: 1.5     # 量比門檻（當日量 / 20日均量）
  # ⚠️ 選股漏斗最大瓶頸：全市場僅 14% stock-day 通過＝每日 0 候選主因。但放寬只增訊號不增交易
  #    （被 6 格並倉綁死）且降品質 → 維持 1.5。真正待解的是並倉/出場，見 master 第六章 Phase 6/7。
  rsi_period: 14
  rsi_min: 50               # RSI 下限
  rsi_max: 80               # RSI 上限（避免追超買）

# --- 籌碼評分條件（加分制，總分 ≥ min_score 才入候選）---
chip_scoring:
  foreign_buy_days: 3       # 外資連買計算天數
  foreign_buy_score: 2      # 外資買超得分
  trust_buy_days: 5         # 投信連買計算天數
  trust_buy_score: 1        # 投信買超得分
  margin_ratio_max: 0.15    # 融資使用率上限（15% 以下＝籌碼乾淨，加分）
  margin_clean_score: 1     # 融資乾淨得分
  short_surge_penalty: -1   # 融券急增扣分
  short_surge_days: 3       # 融券急增判斷天數
  short_surge_ratio: 0.2    # 融券增加 20% 視為急增
  min_score: 2              # 進入候選清單最低分

# --- 進場規則 ---
entry:
  max_positions: 6          # 最多同時持倉檔數
  # ⚠️ 這是交易頻率的「真正天花板」（非濾網/選股範圍）：同 35 檔 6→10→15→20，交易/年 27.8→43.6→61.5→73.8，
  #    但單純加大並未改善 Sharpe、還惡化 DD → 要加大必須同時改「選股品質 + 出場」，見 master 第六章 Phase 6。
  position_size_pct: 0.30   # 單股最大佔總資金比例（flat 模式用；vol_target 模式由 sizing 控）

# --- 出場規則（趨勢跟隨：移動停損為主、不設停利、抱贏家）---
exit:
  stop_loss_pct: -0.05      # 初始硬停損（僅 use_trailing=false 時使用）
  take_profit_pct: null     # 不設停利上限，讓贏家續抱
  max_hold_days: 60         # 持有上限（交易日）
  ma_break_exit: false      # 不採「跌破 MA20 出場」（過度交易主因）
  use_trailing: true        # 啟用移動停損（抱贏家核心）
  trailing_stop_pct: 0.12   # fixed 模式：自波段高點回落 12% 出場
  trailing_mode: "atr"      # 移動停損寬度模式：fixed（固定%）/ atr（隨個股波動自適應）
  atr_period: 14
  atr_mult: 4.5             # 停損寬度 = atr_mult × ATR%（波動大→寬、小→緊）
  atr_trail_min: 0.08       # 寬度下限
  atr_trail_max: 0.09       # 寬度上限
  # ⚠️ ATR 8–9% 對高波動電子/AI 股偏緊 → 2024 大多頭只 +7.2%（0050 +49%）＝被洗出後難追回，是
  #    「趨勢策略卻在大多頭年慘敗」的主因之一。v2 待修出場（自適應寬度 / 停損後重進場），見 master 第六章 Phase 7。

# --- 部位規模（方式A：波動度反比配重）---
sizing:
  method: "vol_target"      # flat（固定 position_size_pct）/ vol_target（波動度反比）
  vol_lookback: 20          # 個股日報酬波動回看交易日
  target_vol_daily: 0.02    # 個股目標日波動(2%)；vol<此→放大配重、vol>此→縮小
  min_position_pct: 0.10    # 單檔配重下限
  max_position_pct: 0.30    # 單檔配重上限（避免單檔過度集中）

# --- 選股範圍（live 每日掃描）---
universe:
  mode: "watchlist"          # watchlist（只掃下方清單，免費 FinMind 額度友善）/ full（全市場，需付費 FinMind）
  max_scan: 150              # full 模式安全上限（保護免費額度）
  # ⚠️ 下方 watchlist 為人工後見之明選股（2026-06 用「近3年CAGR」加 AI 贏家、剔落後股）＝倖存者偏誤：
  #    回測好看但前瞻績效恐打折；且擴大選股不增交易頻率、反稀釋集中策略品質。
  #    v2 改 point-in-time 規則化動態選股並 walk-forward 驗證，見 master 第六章 Phase 9。
  watchlist: ["2330","2454","2303","2308","3711","2337",
              "2317","2382","2357","3231","2356",
              "2881","2882","2891","2886","2884","2885","2892","5880",
              "1301","1303","1326","2002","1101","2207",
              "2603","2609","2615","2412","2912","1216",
              "3017","8299","2449","8210"]

# --- 大盤趨勢濾鏡（regime）---
regime:
  enabled: true
  proxy: "0050"             # 大盤趨勢代理（0050 近似加權指數，免費層可取）
  ma_period: 60             # 進場：代理收盤站上 60 日均線才算多頭

# --- 投降感知 regime（真底/假反彈分類器；live 採 block_only：只擋熊市假反彈，救 2022）---
# 三態：TRUE_BOTTOM / FALSE_REBOUND（收復 MA60 但 MA60 下彎且仍深熊→擋掉）/ NORMAL_BULL / BEAR。
# block_only 只依賴 0050（不需 panel/籌碼）；廣度/籌碼代理釘選 universe_list，測量基準不隨 watchlist 漂移。
capitulation:
  enabled: true
  allow_mode: "block_only"       # live 僅用 block_only（只擋假反彈、不早解鎖）
  warm_start: "2016-01-01"       # 因果百分位暖身錨定日（穩定 cache key、避免重抓爆額度）
  universe_source: "fixed"       # fixed＝廣度/籌碼代理釘選下方 universe_list
  universe_list: ["2330","2454","2303","2308","2379","3034","3711","2337","6415","3008",
                  "2317","2382","2357","2376","3231","4938","2356","2353",
                  "2881","2882","2891","2886","2884","2885","2892","5880",
                  "1301","1303","1326","2002","1101","2207",
                  "2603","2609","2615","2412","2912","1216"]
  pct_window: 756                # 因果滾動百分位回看(~3年交易日)
  pct_min_periods: 252           # 暖身最小樣本(~1年)，不足用 expanding；無前視
  deep_high_lookback: 252        # 以 252 日高點衡量熊市深度
  deep_dd: -0.10                 # 距 252 日高 ≤ -10% 才算深處熊市（所有判斷的必要前提）
  panic_vol_pctl: 0.85           # Block A 恐慌：已實現波動(20d) 因果百分位 ≥
  breadth_below_ma60: 0.75       # Block B 廣度：close<MA60 檔數比例 ≥
  breadth_decline_3dma: 0.65     # Block B 廣度：3日均下跌家數比 ≥
  margin_q: 0.05                 # Block C 融資斷頭：市場融資 chg20 ≤ 滾動 q05
  margin_abs: -0.15              # Block C 融資斷頭：或 ≤ -15%
  foreign_sell_z: 2.0            # Block D 外資賣壓：因果 z ≥（只能 co-confirm，永不單獨成立真底）
  ma60_falling_days: 20          # 假反彈判定：MA60 < MA60[-N] = 下彎
  failed_bottom_exit: false      # 失敗底市場級出場：實證反傷（2024 快V誤砍）→ 關閉。
  # ⚠️ 此鍵必須保留並釘 false：code 端 .get 預設為 True，移除＝誤開啟。其餘 failed_*/deep_bear 參數已移除（見 master 6.9）。

# --- 交易模式（盤中零股；5–7 萬全走零股，回測對齊實盤）---
trading:
  mode: "odd_lot"           # odd_lot（=live 實況）/ hybrid / round_lot
  lot_size: 1               # 計價單位：整股=1000、零股=1
  order_lot: "IntradayOdd"  # Shioaji 委託股別：盤中零股（須與 lot_size=1 一致）
  afterhours_fill: true     # 盤中掛不到的單於 13:50 改掛盤後零股(Odd)→14:30 集合競價補上
  odd_lot_fill_model: true  # 零股成交不確定性模型（賣方深度不足→盤中不成交→轉盤後補單）
  odd_lot_depth_levels: 1   # （legacy；parse_odd_book 判定吃幾檔賣方深度）
  odd_lot_book_levels: 5    # book-walk 解析賣方階梯檔數
  odd_lot_max_impact_pct: 0.004  # book-walk 吃多檔的價格衝擊上限（與零股滑價同量級）
  slippage: 0.004           # 非 hybrid 時的單一滑價
  round_lot_slippage: 0.001 # 整股滑價（實測半價差 ~0.05–0.1%）
  odd_lot_slippage: 0.0015  # 零股滑價（實測盤中半價差中位 0.092%）
  min_liquidity_turnover: 50000000   # 流動性濾網：整股 20 日均成交額門檻(元)

# --- 交易成本（台股）---
cost:
  buy_fee_rate: 0.001425    # 買進手續費 0.1425%
  sell_fee_rate: 0.001425   # 賣出手續費 0.1425%
  sell_tax_rate: 0.003      # 交易稅 0.3%（賣出才收）
  min_fee: 20               # 整股最低手續費 20 元
  min_fee_odd: 1            # 零股最低手續費 1 元（逐筆計費）
  fee_rebate: 0.0           # 手續費退傭率（折讓），0=無

# --- 回測設定（舊 vectorbt 框架 backtester.py 用；現行 live-aligned 回測 capped_sim 另以 2018–2025/100k 為準）---
backtest:
  start_date: "2019-01-01"
  insample_end: "2022-12-31"   # In-sample 結束
  outsample_end: "2024-12-31"  # Out-of-sample 結束
  initial_capital: 1_000_000   # 回測初始資金（元）

# --- 績效門檻（Gate 條件）---
performance_gate:
  min_sharpe: 1.0
  max_drawdown: -0.15       # 最大回撤不超過 -15%
  min_annual_return: 0.10   # 年化報酬 > 10%
  min_trades: 50            # 最少交易筆數
