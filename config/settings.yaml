# ==========================================
# 系統設定
# ==========================================

# --- 策略路由（active 現行籌碼策略 / benchmark 0050 波動目標對照組）---
# mode=active：完全照舊（ScoreEngine 選股 + ATR 移動停損，main.py active 分支原封不動）。
# mode=benchmark：只交易 0050，依「波動目標」算曝險、每月或偏離 >5pp 才再平衡（見 src/strategy_engines）。
#   benchmark 不套用 active 的籌碼候選與 ATR 移動停損（它有自己的再平衡邏輯）。
strategy:
  mode: benchmark           # active | benchmark  ← R6 被動落地（2026-06-17）：PIT 重建裁決＝誠實池無前瞻 alpha → 改被動為主
  # --- 對照組（benchmark）參數，僅 mode=benchmark 時生效 ---
  benchmark:
    symbol: "0050"          # 對照組標的（只用 0050）
    target_daily_vol: 1.0   # R6 定稿：=100%/日（遠高於 0050 實現波動）→ vol-cap 永不 binding＝base 恆 100% 跟 0050；唯一作用＝下方 MA200 overlay
    vol_lookback: 20        # 已實現波動回看交易日（realized_vol_20d）
    exposure_cap: 1.0       # 曝險上限（不加槓桿，其餘擺現金）
    rebalance_band: 0.05    # 當前曝險偏離目標 > 此(5pp) 才調倉（降低換手）
    monthly_rebalance: true # 每月第一個交易日強制再平衡（即使未偏離）
    # regime overlay：0050 收盤跌破 MA 時砍曝險。regime_action 支援 "zero"(歸零)/"half"(減半)/數值 0~1(保留比例)
    regime_overlay: true    # R6 定稿：啟用＝MA200 最後一道防線（平時滿倉跟 0050，唯 0050 跌破 MA200 才砍倉）
    regime_ma: 200          # 最後防線門檻＝0050 200日均線（canonical、whipsaw 最少；要更快改 120/60）
    regime_action: 0.85     # R6 定稿：跌破 MA200 → 保留 85% 曝險（輕度退場、漲回回滿）；0=全退、0.5=半倉
    # --- whipsaw 修正（E1+E2 整併，2026-06-18 落地；walk-forward OOS 驗證；預設 1/0.0＝舊每日 MA200 規則）---
    regime_confirm_days: 3  # E1：連續 N 日跌破 MA200×(1−band) 才砍至 85%、連續 N 日站回 ×(1+band) 才回滿（N=3＝Alvarez 文獻甜蜜點、高原內穩健值）
    regime_band_pct: 0.01   # E2：MA200 ±1% 對稱緩衝帶死區（≈0050 一日移動）；combined N=3+1% 已過結構 Gate（2022 假穿越 7→1、DD −31.2→−30.5%、牛市/2020 不犧牲）

  # --- 6 資產 Asset Allocator（M5；additive、僅 mode=allocator 時生效；mode 維持 benchmark）---
  # 規格真相＝MULTI_ASSET_UPGRADE_PLAN.md §3.7 + tw_rebalancing_rules_2026_07.md + full_book_backtest.target_weights()
  # 數字逐項對齊 §3.7 凍結參數（TARGET/BANDS/A_DERISK=0.75/SELL_FRAC=0.60）；任一改動兩邊同步（單一真相）。
  allocator:
    enabled_layers: ["M0", "M1"]      # M2 預設不開（macro feed 驗證後再開）；全開＝["M0","M1","M2"]
    assets:                            # 目標權重 + 不對稱帶寬（對齊 §3.7 / tw_rebalancing_rules §1）
      "0050":   {target: 0.35,  band_lower: 0.31,  band_upper: 0.42}
      "00981A": {target: 0.16,  band_lower: 0.13,  band_upper: 0.23}   # 上界 +7%（2026-06-19b 放寬，留肥尾安全邊際）
      "00991A": {target: 0.16,  band_lower: 0.125, band_upper: 0.23}
      "00635U": {target: 0.10,  band_lower: 0.08,  band_upper: 0.15}
      "00864B": {target: 0.115, band_lower: 0.10,  band_upper: 0.15}
      "MMF":    {target: 0.115, band_lower: 0.095, band_upper: 0.145}
    sell_priority: ["00991A", "00981A", "00635U", "0050"]              # 多風險資產同時超上界的賣序（tw_rules §3）
    buy_priority:  ["0050", "00981A", "00991A", "00635U"]              # 多風險資產同時破下界的補序（反向）
    funding_priority: ["MMF_excess", "MMF_normal", "00864B_excess", "other_sells"]  # 補倉資金來源序（tw_rules §3）
    sell_fraction: 0.60                # 超過 target 賣 60%（不賣到 target、留強勢續跑；SELL_FRAC）
    hard_floor: {MMF: 0.095, "00864B": 0.10}     # 硬地板：不得因補倉低於此（tw_rules §7）
    equity_sleeve: ["0050", "00981A", "00991A"]  # M1 股票 sleeve（EQUITY）
    M1:                                # 股票下行 de-risk（複用 benchmark_engine._regime_below）
      signal_symbol: "0050"
      ma: 200
      confirm_days: 3                  # E1+E2 骨幹（連 3 日跌破 MA200×0.99 + ±1% 帶確認）
      band_pct: 0.01
      derisk_action: 0.75              # ON → 股票 sleeve flat ×0.75（A_DERISK；非分層）
      suspend_equity_dip_buy: true     # ON 時暫停股票買跌
      freed_to: {MMF: 0.667, "00635U": 0.333}    # 釋出資金去向（2/3→MMF + 1/3→黃金；黃金上限 band_upper 15%）
    M2:                                # 美元 tilt（雙確認 CPI+Fed；只動現金 00864B↔MMF）
      enabled: false                   # 先關；macro feed 驗證後再開（§5 分階段）
      cpi_series: "CPIAUCSL"
      fed_series: "FEDFUNDS"
      lookback_months: 3               # YoY 近 3 月變化窗
      confirm_months: 2                # 連 2 月確認
      publish_lag_months: 2            # 發布落後 shift(2)（CPI~1mo + 安全；防 look-ahead）
      magnitude_pp: 0.05               # ±5pp tilt（受硬地板/上限 clip）
      scope: ["00864B", "MMF"]         # 只在現金腿互換
    rebalance:                         # 再平衡觸發旗標
      monthly_first_day: true          # 當月首交易日
      on_regime_change: true           # M1 regime_on 變動
      on_usd_change: true              # M2 usd_regime 變動
    mmf_annual_yield: 0.015            # 合成 MMF 年化 accrual（SyntheticMMF）
    transaction_cost_oneway: 0.002     # 單邊周轉成本（各腿、非 MMF；TC）

# --- 排程時間（24h 格式，台灣時區）---
schedule:
  pre_market: "08:50"       # 盤前選股
  market_open: "09:12"      # 開盤下單（零股09:10首撮「後」再掛→拿真實薄帳、避開預撮寬報價；訊號為昨收無急迫性）
  intraday_check: 5         # 盤中風控掃描間隔（分鐘）
  market_close: "13:30"     # 收盤（盤中監控只在 market_open~market_close 之間動作）
  post_market: "14:00"      # 盤後報表

# --- 資料設定 ---
data:
  finmind_sleep: 0.5        # FinMind API 請求間隔（秒）
  finmind_retry: 3          # 最大重試次數
  scan_workers: 6           # TA 掃描並發數（平行抓 FinMind；太高會觸發限流，6 為平衡點）
  cache_days: 1             # 本地資料快取天數
  raw_data_path: "./data/raw"
  processed_data_path: "./data/processed"

# --- 風控設定 ---
risk:
  daily_loss_limit: -0.02   # 單日虧損上限（總資金 -2% 全停機）
  consecutive_loss_halt: 3  # 連虧 N 筆暫停，等人工審核
  emergency_exit_on_halt: false  # 熔斷時是否自動市價出場

# --- 券商設定 ---
broker:
  mode: "paper"              # paper（本地模擬撮合）/ shioaji（永豐實盤，需開戶+API key）
  paper_initial_cash: 100000  # 模擬盤初始資金（2026-06-10 由 7 萬升 10 萬；重啟前須刪 data/processed/paper_account.json 才生效）

# --- 通知設定 ---
notify:
  provider: "line"           # 主推播：line（Messaging API push）/ telegram
  backup: "discord"          # 備援（主推超額或失敗時）：discord / telegram / none
  daily_cap: 8               # 主推播每日上限，超過自動轉備援

# --- 日誌設定 ---
logging:
  level: "INFO"             # DEBUG / INFO / WARNING / ERROR
  rotation: "1 day"         # 日誌輪轉頻率
  retention: "30 days"      # 保留天數
  log_path: "./logs"
